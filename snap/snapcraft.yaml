name: agenteia
base: core24
version: '1.0.0'
title: AgenteIA - Assistente Desktop Multimodal
summary: Seu Assistente Pessoal Desktop
description: |
  AgenteIA é um assistente desktop desenvolvido em Go e Wails para integração com diversos provedores de modelos de linguagem (LLMs). O objetivo é fornecer uma interface rápida e local para produtividade.
icon: snap/gui/icon.png
contact: https://github.com/erascardsilva/agenteIA
issues: https://github.com/erascardsilva/agenteIA/issues
license: MIT

grade: stable
confinement: strict

platforms:
  amd64:

apps:
  agenteia:
    command: bin/agenteIA
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - home
      - desktop
      - desktop-legacy
      - wayland
      - x11
      - opengl
      - audio-playback

parts:
  agenteia:
    plugin: nil
    source: .
    build-snaps:
      - go
      - node/20/stable
    build-packages:
      - build-essential
      - libgtk-3-dev
      - libwebkit2gtk-4.1-dev
    override-build: |
      go install github.com/wailsapp/wails/v2/cmd/wails@latest

      npm install --prefix frontend

      ~/go/bin/wails build -m -tags webkit2_41 -nsis=false -upx=false -trimpath -o agenteIA

      mkdir -p $CRAFT_PART_INSTALL/bin
      cp build/bin/agenteIA $CRAFT_PART_INSTALL/bin/agenteIA
