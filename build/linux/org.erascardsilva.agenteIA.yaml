app-id: org.erascardsilva.agenteIA
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
command: agenteIA
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.SpeechDispatcher
  - --talk-name=org.speech_dispatcher.SpeechDispatcher
  - --talk-name=org.freedesktop.portal.Flatpak
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.portal.Desktop
  - --metadata=X-DConf=comm-read-only
  - --allow=devel
modules:
  - name: agenteIA
    buildsystem: simple
    build-commands:
      - install -D agenteIA /app/bin/agenteIA
      - install -D org.erascardsilva.agenteIA.desktop /app/share/applications/org.erascardsilva.agenteIA.desktop
      - install -D org.erascardsilva.agenteIA.metainfo.xml /app/share/metainfo/org.erascardsilva.agenteIA.metainfo.xml
      - install -D appicon.png /app/share/icons/hicolor/512x512/apps/org.erascardsilva.agenteIA.png
    sources:
      - type: file
        path: ../bin/agenteIA
      - type: file
        path: org.erascardsilva.agenteIA.desktop
      - type: file
        path: org.erascardsilva.agenteIA.metainfo.xml
      - type: file
        path: ../appicon.png
